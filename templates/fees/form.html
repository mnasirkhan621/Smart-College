{% extends "base.html" %}

{% block title %}{{ title }} - SCMS{% endblock %}

{% block content %}
<section class="auth-panel wide">
  <h1>{{ title }}</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button primary" type="submit">Save</button>
    <a class="button" href="{{ cancel_url }}">Cancel</a>
  </form>
</section>
{% endblock %}
