{% extends "base.html" %}

{% block title %}Create User - SCMS{% endblock %}

{% block content %}
<section class="auth-panel wide">
  <h1>Create User</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button primary" type="submit">Create</button>
    <a class="button" href="{% url 'accounts:user_list' %}">Cancel</a>
  </form>
</section>
{% endblock %}
