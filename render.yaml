services:
  - type: web
    name: smart-college
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .render.com
      - key: DATABASE_URL
        fromDatabase:
          name: scms-db
          property: connectionString

databases:
  - name: scms-db
    databaseName: scms
    user: scms
    plan: free
